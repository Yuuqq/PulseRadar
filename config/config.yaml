advanced:
  batch_send_interval: 3
  batch_size:
    bark: 4000
    default: 4000
    dingtalk: 20000
    feishu: 30000
    slack: 4000
  configs_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs
  crawler:
    api_url: ''
    default_proxy: http://127.0.0.1:10801
    request_interval: 2000
    use_proxy: false
  debug: false
  feishu_message_separator: ━━━━━━━━━━━━━━━━━━━
  max_accounts_per_channel: 3
  mcp_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp
  rss:
    proxy_url: ''
    request_interval: 1000
    timeout: 15
    use_proxy: false
  version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version
  weight:
    frequency: 0.3
    hotness: 0.1
    rank: 0.6
ai:
  model: openai/LongCat-Flash-Lite
  api_key: ak_2Nm46W1o70Cu9IK4PQ4114cY2KB4G
  api_base: https://api.longcat.chat/openai/v1
  timeout: 120
  temperature: 1
  max_tokens: 5000
  num_retries: 1
  fallback_models: []
ai_analysis:
  enabled: true
  language: Chinese
  mode: follow_report
  max_news_for_analysis: 60
  include_rss: false
  include_rank_timeline: true
  prompt_file: ai_analysis_prompt.txt
  analysis_window:
    enabled: false
    start: 09:00
    end: '22:00'
    once_per_day: false
ai_translation:
  enabled: true
  language: Chinese
  prompt_file: ai_translation_prompt.txt
app:
  show_version_update: true
  timezone: Asia/Shanghai
display:
  region_order:
  - new_items
  - hotlist
  - rss
  - standalone
  - ai_analysis
  regions:
    ai_analysis: true
    hotlist: true
    new_items: true
    rss: true
    standalone: false
  standalone:
    max_items: 20
    platforms: []
    rss_feeds: []
